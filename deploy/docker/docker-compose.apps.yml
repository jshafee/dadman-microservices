      Auth__Issuer: ${AUTH_ISSUER}
      Auth__Audience: ${AUTH_AUDIENCE}
      Auth__SigningKey: ${AUTH_SIGNING_KEY}
      Services__Catalog__BaseUrl: http://catalog-api:8080
      Services__Catalog__ServiceToken: ${CATALOG_SERVICE_TOKEN}
      Seq__ServerUrl: http://seq:80
    ports:
      - "5102:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
      seq:
        condition: service_started
      catalog-api:
