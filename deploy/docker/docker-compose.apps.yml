services:
  catalog-api:
    image: ghcr.io/${GHCR_OWNER:-local}/${GHCR_REPOSITORY:-dadman-microservices-backend}/catalog-api:${DADMAN_IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dotnet
      args:
        PROJECT: src/Services/Catalog/Catalog.Api/Catalog.Api.csproj
    command: ["Catalog.Api.dll"]
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__CatalogDb: Server=sqlserver,1433;Database=CatalogDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Auth__Issuer: ${AUTH_ISSUER}
      Auth__Audience: ${AUTH_AUDIENCE}
      Auth__SigningKey: ${AUTH_SIGNING_KEY}
      Seq__ServerUrl: http://seq:80
    ports:
      - "5101:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
      seq:
        condition: service_started

  ordering-api:
    image: ghcr.io/${GHCR_OWNER:-local}/${GHCR_REPOSITORY:-dadman-microservices-backend}/ordering-api:${DADMAN_IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dotnet
      args:
        PROJECT: src/Services/Ordering/Ordering.Api/Ordering.Api.csproj
    command: ["Ordering.Api.dll"]
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ConnectionStrings__OrderingDb: Server=sqlserver,1433;Database=OrderingDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Auth__Issuer: ${AUTH_ISSUER}
      Auth__Audience: ${AUTH_AUDIENCE}
      Auth__SigningKey: ${AUTH_SIGNING_KEY}
      Services__Catalog__BaseUrl: http://catalog-api:8080
      Services__Catalog__ServiceToken: ${CATALOG_SERVICE_TOKEN}
      Seq__ServerUrl: http://seq:80
    ports:
      - "5102:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
      seq:
        condition: service_started
      catalog-api:
        condition: service_healthy

  catalog-migrator:
    image: ghcr.io/${GHCR_OWNER:-local}/${GHCR_REPOSITORY:-dadman-microservices-backend}/catalog-migrator:${DADMAN_IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dotnet
      args:
        PROJECT: src/Tools/Catalog.Migrator/Catalog.Migrator.csproj
    command: ["Catalog.Migrator.dll"]
    environment:
      ConnectionStrings__CatalogDb: Server=sqlserver,1433;Database=CatalogDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true
      Seq__ServerUrl: http://seq:80
    depends_on:
      sqlserver:
        condition: service_healthy

  ordering-migrator:
    image: ghcr.io/${GHCR_OWNER:-local}/${GHCR_REPOSITORY:-dadman-microservices-backend}/ordering-migrator:${DADMAN_IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dotnet
      args:
        PROJECT: src/Tools/Ordering.Migrator/Ordering.Migrator.csproj
    command: ["Ordering.Migrator.dll"]
    environment:
      ConnectionStrings__OrderingDb: Server=sqlserver,1433;Database=OrderingDb;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true
      Seq__ServerUrl: http://seq:80
    depends_on:
      sqlserver:
        condition: service_healthy

  gateway-api:
    image: ghcr.io/${GHCR_OWNER:-local}/${GHCR_REPOSITORY:-dadman-microservices-backend}/gateway-api:${DADMAN_IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dotnet
      args:
        PROJECT: src/Gateway/Gateway.Api/Gateway.Api.csproj
    command: ["Gateway.Api.dll"]
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      Auth__Issuer: ${AUTH_ISSUER}
      Auth__Audience: ${AUTH_AUDIENCE}
      Auth__SigningKey: ${AUTH_SIGNING_KEY}
      ReverseProxy__Clusters__catalog-cluster__Destinations__catalog__Address: http://catalog-api:8080
      ReverseProxy__Clusters__ordering-cluster__Destinations__ordering__Address: http://ordering-api:8080
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Seq__ServerUrl: http://seq:80
      REDIS_CONNECTIONSTRING: ${REDIS_CONNECTIONSTRING}
    ports:
      - "5100:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      otel-collector:
        condition: service_started
      seq:
        condition: service_started
      catalog-api:
        condition: service_healthy
      ordering-api:
        condition: service_healthy

  integration-worker:
    image: ghcr.io/${GHCR_OWNER:-local}/${GHCR_REPOSITORY:-dadman-microservices-backend}/integration-worker:${DADMAN_IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.dotnet
      args:
        PROJECT: src/Workers/Integration/Integration.Worker/Integration.Worker.csproj
    command: ["Integration.Worker.dll"]
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: ${RABBITMQ_DEFAULT_USER}
      RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      Auth__Issuer: ${AUTH_ISSUER}
      Auth__Audience: ${AUTH_AUDIENCE}
      Auth__SigningKey: ${AUTH_SIGNING_KEY}
      Seq__ServerUrl: http://seq:80
    depends_on:
      rabbitmq:
        condition: service_healthy
      otel-collector:
        condition: service_started
      seq:
        condition: service_started
