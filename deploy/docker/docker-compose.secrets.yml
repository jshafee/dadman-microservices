services:
  gateway-api:
    secrets:
      - source: auth-signing-key
        target: "Auth:SigningKey"
      - source: rabbitmq-username
        target: "RabbitMq:Username"
      - source: rabbitmq-password
        target: "RabbitMq:Password"
      - source: catalog-service-token
        target: "Services:Catalog:ServiceToken"

  catalog-api:
    secrets:
      - source: auth-signing-key
        target: "Auth:SigningKey"
      - source: rabbitmq-username
        target: "RabbitMq:Username"
      - source: rabbitmq-password
        target: "RabbitMq:Password"

  ordering-api:
    secrets:
      - source: auth-signing-key
        target: "Auth:SigningKey"
      - source: rabbitmq-username
        target: "RabbitMq:Username"
      - source: rabbitmq-password
        target: "RabbitMq:Password"
      - source: catalog-service-token
        target: "Services:Catalog:ServiceToken"

  integration-worker:
    secrets:
      - source: auth-signing-key
        target: "Auth:SigningKey"
      - source: rabbitmq-username
        target: "RabbitMq:Username"
      - source: rabbitmq-password
        target: "RabbitMq:Password"

secrets:
  auth-signing-key:
    file: ${AUTH_SIGNING_KEY_FILE:-./secrets/Auth__SigningKey.example}
  rabbitmq-username:
    file: ${RABBITMQ_USERNAME_FILE:-./secrets/RabbitMq__Username.example}
  rabbitmq-password:
    file: ${RABBITMQ_PASSWORD_FILE:-./secrets/RabbitMq__Password.example}
  catalog-service-token:
    file: ${CATALOG_SERVICE_TOKEN_FILE:-./secrets/Services__Catalog__ServiceToken.example}
